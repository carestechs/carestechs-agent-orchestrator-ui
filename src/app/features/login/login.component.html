<div class="min-h-screen bg-slate-50 flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    @if (expiredBanner()) {
      <div
        role="status"
        class="bg-amber-50 border border-amber-200 text-amber-800 rounded-lg px-4 py-3 mb-4 text-sm"
      >
        <p class="font-medium">Your session expired</p>
        <p class="text-amber-700/80">Sign in again to continue where you left off.</p>
      </div>
    }

    <div class="bg-white rounded-lg shadow-sm p-8">
      <div class="flex flex-col items-center mb-6">
        <h1 class="font-[Poppins] text-slate-900 text-2xl font-semibold">Agent Orchestrator</h1>
        <p class="text-sm text-slate-500 mt-1">Operator console</p>
      </div>

      <form class="space-y-4" (ngSubmit)="submit()" #f="ngForm">
        <div>
          <label for="passphrase" class="block text-sm font-medium text-slate-700 mb-1.5">
            Passphrase
          </label>
          <input
            id="passphrase"
            type="password"
            name="passphrase"
            autocomplete="current-password"
            required
            [ngModel]="passphrase()"
            (ngModelChange)="passphrase.set($event)"
            [attr.aria-invalid]="errorCode() !== null ? 'true' : null"
            [attr.aria-describedby]="errorMessage() ? 'login-error' : null"
            [class.border-red-400]="errorCode() !== null"
            [class.border-slate-300]="errorCode() === null"
            class="w-full rounded-lg border px-3 py-2 outline-none focus:border-sky-500 focus:ring-2 focus:ring-sky-100"
          />
          @if (errorMessage()) {
            <p id="login-error" class="mt-1.5 text-sm text-red-600">{{ errorMessage() }}</p>
          }
        </div>

        <button
          type="submit"
          [disabled]="submitting() || !passphrase()"
          class="w-full bg-sky-500 hover:bg-sky-600 active:translate-y-px text-white font-medium rounded-lg px-4 py-2 transition-all duration-200 disabled:opacity-60 disabled:cursor-not-allowed inline-flex items-center justify-center gap-2"
        >
          @if (submitting()) {
            <span
              aria-hidden="true"
              class="inline-block h-4 w-4 rounded-full border-2 border-white/40 border-t-white animate-spin"
            ></span>
            <span>Signing in…</span>
          } @else {
            <span>Sign in</span>
          }
        </button>
      </form>
    </div>
  </div>
</div>
