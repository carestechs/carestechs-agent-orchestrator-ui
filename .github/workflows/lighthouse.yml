name: Lighthouse a11y

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  a11y:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ORCHESTRATOR_API_KEY: test-key-do-not-leak
      ORCHESTRATOR_OPERATOR_PASSPHRASE: e2e-passphrase
      ORCHESTRATOR_BASE_URL: http://127.0.0.1:4100
      SESSION_SECRET: ci-session-secret
      NODE_ENV: test
      E2E_PASSPHRASE: e2e-passphrase
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome
        with:
          chrome-version: stable
      - run: npm ci

      - name: Build SPA + BFF (postbuild scans for secret leaks)
        run: npm run build

      # Boot all three services and wait for readiness in a single step.
      # GitHub Actions runs each step in a fresh shell, so backgrounded
      # processes from a previous step are orphaned and may be reaped before
      # the next step's `wait-on` ever sees them. Keeping boot + wait in one
      # shell, with nohup + disown so the processes outlive any sub-shell,
      # is the reliable pattern.
      - name: Boot stack and wait for readiness
        run: |
          mkdir -p /tmp/lhci-logs
          nohup npm run upstream-mock > /tmp/lhci-logs/upstream.log 2>&1 &
          echo $! > /tmp/upstream.pid
          disown || true

          nohup node --import tsx bff/src/server.ts > /tmp/lhci-logs/bff.log 2>&1 &
          echo $! > /tmp/bff.pid
          disown || true

          # ng serve handles SPA fallback (any unknown path returns index.html
          # so /runs/:id resolves to the Angular app) and the BFF proxy via
          # proxy.conf.json. http-server with --proxy doesn't combine the two,
          # which is what 404'd Lighthouse on /runs and /runs/:id.
          nohup npm run start -- --host 0.0.0.0 > /tmp/lhci-logs/spa.log 2>&1 &
          echo $! > /tmp/spa.pid
          disown || true

          # ng serve compile can take 30–60s on a cold CI runner; budget 3min.
          npx --yes wait-on \
            http-get://127.0.0.1:4100/v1/agents \
            http-get://localhost:4000/auth/me \
            http-get://localhost:4200 \
            --timeout 180000 \
            --interval 1000

      - name: Run Lighthouse CI
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run lhci:run

      - name: Show service logs on failure
        if: failure()
        run: |
          echo '--- upstream-mock log ---'
          tail -n 200 /tmp/lhci-logs/upstream.log || true
          echo '--- BFF log ---'
          tail -n 200 /tmp/lhci-logs/bff.log || true
          echo '--- SPA static-server log ---'
          tail -n 200 /tmp/lhci-logs/spa.log || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouseci-report
          path: ./.lighthouseci

      - name: Stop background services
        if: always()
        run: |
          for f in /tmp/upstream.pid /tmp/bff.pid /tmp/spa.pid; do
            if [ -f "$f" ]; then kill "$(cat "$f")" 2>/dev/null || true; fi
          done
