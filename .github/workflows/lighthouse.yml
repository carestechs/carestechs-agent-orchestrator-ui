name: Lighthouse a11y

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  a11y:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: test
      E2E_PASSPHRASE: e2e-passphrase
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome
        with:
          chrome-version: stable
      - run: npm ci

      # FEAT-003 T-029 — Angular fileReplacements requires both env files at
      # build time. Real values are gitignored; CI uses test placeholders.
      - name: Materialize SPA env files
        run: |
          cat > src/environments/environment.ts <<'EOF'
          import type { EnvironmentConfig } from './environment.example';
          export const environment: EnvironmentConfig = {
            production: false,
            orchestratorBaseUrl: 'http://127.0.0.1:4100',
            orchestratorApiKey: 'test-key-do-not-leak',
            operatorPassphrase: 'e2e-passphrase',
          };
          EOF
          cp src/environments/environment.ts src/environments/environment.prod.ts

      - name: Build SPA (postbuild scans for forbidden values)
        run: npm run build

      # After FEAT-003 T-032 there is no BFF. The stack is just the upstream
      # mock (so the SPA's runtime fetches resolve) and the static server for
      # the production build.
      - name: Boot stack and wait for readiness
        run: |
          mkdir -p /tmp/lhci-logs
          nohup npm run upstream-mock > /tmp/lhci-logs/upstream.log 2>&1 &
          echo $! > /tmp/upstream.pid
          disown || true

          nohup npm run lhci:serve > /tmp/lhci-logs/spa.log 2>&1 &
          echo $! > /tmp/spa.pid
          disown || true

          npx --yes wait-on \
            http-get://127.0.0.1:4100/v1/agents \
            http-get://localhost:4200 \
            --timeout 60000 \
            --interval 500

      - name: Run Lighthouse CI
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run lhci:run

      - name: Show service logs on failure
        if: failure()
        run: |
          echo '--- upstream-mock log ---'
          tail -n 200 /tmp/lhci-logs/upstream.log || true
          echo '--- SPA static-server log ---'
          tail -n 200 /tmp/lhci-logs/spa.log || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouseci-report
          path: ./.lighthouseci

      - name: Stop background services
        if: always()
        run: |
          for f in /tmp/upstream.pid /tmp/spa.pid; do
            if [ -f "$f" ]; then kill "$(cat "$f")" 2>/dev/null || true; fi
          done
