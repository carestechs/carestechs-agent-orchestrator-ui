name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # FEAT-003 T-029 — Angular env files must exist before lint/test/build.
      # Real values are gitignored; CI materializes test placeholders.
      - name: Materialize SPA env files
        run: |
          cat > src/environments/environment.ts <<'EOF'
          import type { EnvironmentConfig } from './environment.example';
          export const environment: EnvironmentConfig = {
            production: false,
            orchestratorBaseUrl: 'http://127.0.0.1:4100',
            orchestratorApiKey: 'test-key-do-not-leak',
            operatorPassphrase: 'e2e-passphrase',
          };
          EOF
          cp src/environments/environment.ts src/environments/environment.prod.ts
      - run: npm run lint
      - run: npm test
      - name: Build (postbuild also scans dist for forbidden values)
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
        env:
          CI: 'true'
