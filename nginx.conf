worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout  65;

  gzip on;
  gzip_min_length 1024;
  gzip_types text/css application/javascript application/json image/svg+xml text/plain;
  gzip_vary on;

  # brotli requires the nginx-brotli module; nginx:alpine doesn't ship it.
  # gzip alone gets us ~70% reduction; brotli would push to ~80%. Not worth
  # a base-image swap for v1. If we ever switch, uncomment:
  # brotli on;
  # brotli_types text/css application/javascript application/json image/svg+xml text/plain;

  # nginx quirk: `add_header` directives do NOT inherit into a location block
  # the moment that location has any `add_header` of its own. So we define the
  # baseline + CSP as a reusable snippet via `set $csp ...` and reapply them in
  # every location. Ugly but explicit.
  #
  # Starter Content-Security-Policy. `'unsafe-inline'` on script-src is
  # intentional — Angular's zone.js runtime synthesizes inline event handlers.
  # Tighten in a follow-up after observing live behavior with report-only
  # first. __ORCHESTRATOR_BASE_URL__ is substituted at IMAGE BUILD time by the
  # Dockerfile's runtime stage (sed), not at container startup.

  server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;

    # index.html must never cache — deploys take effect immediately.
    location = /index.html {
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Content-Security-Policy "default-src 'self'; connect-src 'self' __ORCHESTRATOR_BASE_URL__; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:;" always;
      add_header Cache-Control "no-store" always;
      try_files /index.html =404;
    }

    # Hashed assets cache forever — content-addressed by Angular's outputHashing.
    location ~* \.(js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|ico|map)$ {
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Content-Security-Policy "default-src 'self'; connect-src 'self' __ORCHESTRATOR_BASE_URL__; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:;" always;
      add_header Cache-Control "public, max-age=31536000, immutable" always;
      try_files $uri =404;
    }

    # SPA fallback for everything else.
    location / {
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Content-Security-Policy "default-src 'self'; connect-src 'self' __ORCHESTRATOR_BASE_URL__; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:;" always;
      try_files $uri $uri/ /index.html;
    }
  }
}
